name: Build iOS Dylib

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Clone Theos & SDKs
      run: |
        git clone --recursive --depth 1 https://github.com/theos/theos.git ~/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        # sdks 已作为 theos 子模块随 --recursive 一同检出
        ls ~/theos/sdks/ || (echo "SDK submodule missing, fetching manually..." && git clone --depth 1 https://github.com/theos/sdks.git ~/theos/sdks)

    - name: Compile Dylib
      run: |
        make clean
        make

    - name: Upload Dylib Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CellarScanner-Dylib
        path: .theos/obj/debug/*.dylib
